---
# Install Node.js, install OpenClaw via npm globally, set up systemd service.
# Secrets are expected at /etc/openclaw.env (NOT managed here).

- name: Ensure curl is installed (for NodeSource bootstrap)
  ansible.builtin.apt:
    name: curl
    state: present
  become: true

- name: Add NodeSource apt key
  ansible.builtin.apt_key:
    url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
    state: present
  become: true

- name: Add NodeSource apt repo
  ansible.builtin.apt_repository:
    repo: "deb https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
    state: present
    filename: nodesource
  become: true

- name: Install Node.js {{ node_major_version }}
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Install OpenClaw globally via npm
  community.general.npm:
    name: "{{ openclaw_npm_package }}"
    version: "{{ openclaw_pin_version }}"
    global: true
  become: true

- name: Install OpenClaw systemd unit
  ansible.builtin.template:
    src: openclaw.service.j2
    dest: /etc/systemd/system/openclaw.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start openclaw.service
  ansible.builtin.systemd:
    name: openclaw.service
    state: started
    enabled: true
  become: true
