---
# Health-check the entire stack. Read-only — no side effects.
# Fails loudly if anything's broken.

- name: Verify Flow stack health
  hosts: vps
  gather_facts: false

  tasks:
    - name: Check openclaw.service is active
      ansible.builtin.command: systemctl is-active openclaw.service
      register: openclaw_active
      changed_when: false
      failed_when: openclaw_active.stdout != "active"

    - name: Check openclaw-gateway-proxy.service is active (live primary on :8444)
      ansible.builtin.command: systemctl is-active openclaw-gateway-proxy.service
      register: gateway_proxy_active
      changed_when: false
      failed_when: gateway_proxy_active.stdout != "active"

    - name: Check openclaw-sse-proxy.service is MASKED (fallback only — must not race gateway-proxy)
      ansible.builtin.command: systemctl is-enabled openclaw-sse-proxy.service
      register: sse_enabled_state
      changed_when: false
      failed_when: sse_enabled_state.stdout != "masked"

    - name: Check OpenClaw gateway responds on :{{ openclaw_gateway_port }}
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ openclaw_gateway_port }}"
        timeout: 5

    - name: Check gateway-proxy responds on :{{ sse_proxy_listen_port }}
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ sse_proxy_listen_port }}"
        timeout: 5

    - name: Check sender-block patch is present in OpenClaw dist (patch 2026-05-16)
      ansible.builtin.command:
        cmd: grep -rqF -- 'openclaw-patch:sender-block-v1' {{ openclaw_dist_dir | default('/usr/lib/node_modules/openclaw/dist') }}/
      register: sender_block_patch_check
      changed_when: false
      failed_when: sender_block_patch_check.rc != 0

    - name: Check conversation-id ingress patch is present in OpenClaw dist (patch 2026-05-19)
      ansible.builtin.command:
        cmd: grep -rqF -- 'openclaw-patch:conversation-id-ingress-v1' {{ openclaw_dist_dir | default('/usr/lib/node_modules/openclaw/dist') }}/
      register: conv_id_ingress_patch_check
      changed_when: false
      failed_when: conv_id_ingress_patch_check.rc != 0

    - name: Check exec-runtime conv-id env patch is present in OpenClaw dist (patch 2026-05-19)
      # Load-bearing for relay calls: relay is consumed via `exec curl`, not
      # native MCP transport. This patch injects OPENCLAW_CONVERSATION_ID into
      # every exec'd child's env so Flow's exec curl payload can include it
      # in acting_user.conversation_id. The earlier MCP-egress patch was
      # removed because no native MCP transport handles the relay URL on
      # this instance (see patches/2026-05-19-conversation-id-mcp-egress-superseded.md).
      ansible.builtin.command:
        cmd: grep -rqF -- 'openclaw-patch:exec-runtime-conv-id-env-v1' {{ openclaw_dist_dir | default('/usr/lib/node_modules/openclaw/dist') }}/
      register: exec_runtime_conv_id_check
      changed_when: false
      failed_when: exec_runtime_conv_id_check.rc != 0

    - name: Check anthropic provider timeoutSeconds is 600 (patch 2026-05-15)
      ansible.builtin.command:
        cmd: >-
          python3 -c
          'import json,sys;
          cfg=json.load(open("{{ openclaw_config_dir }}/openclaw.json"));
          v=cfg.get("models",{}).get("providers",{}).get("anthropic",{}).get("timeoutSeconds");
          sys.exit(0 if v==600 else 1)'
      register: anthropic_timeout_check
      changed_when: false
      failed_when: anthropic_timeout_check.rc != 0

    - name: Check SearXNG container is running
      community.docker.docker_container_info:
        name: "{{ searxng_container_name }}"
      register: searxng_info
      failed_when: not searxng_info.exists or searxng_info.container.State.Status != "running"

    - name: Check SearXNG responds with a real search
      ansible.builtin.uri:
        url: "http://{{ searxng_listen_host }}:{{ searxng_listen_port }}/search?q=health-check&format=json"
        return_content: true
        status_code: 200
      register: searxng_search
      failed_when: searxng_search.json.results | default([]) | length == 0

    - name: All checks passed
      ansible.builtin.debug:
        msg: |
          ✓ openclaw.service               active
          ✓ openclaw-gateway-proxy.service active   (live primary)
          ✓ openclaw-sse-proxy.service     masked   (fallback, not running)
          ✓ sender-block patch             present in dist (patch 2026-05-16)
          ✓ conv-id ingress patch          present in dist (patch 2026-05-19)
          ✓ exec-runtime conv-id env patch present in dist (patch 2026-05-19)
          ✓ anthropic timeoutSeconds       = 600 (patch 2026-05-15)
          ✓ gateway :{{ openclaw_gateway_port }}                  responding
          ✓ gateway-proxy :{{ sse_proxy_listen_port }}            responding
          ✓ searxng container              running
          ✓ searxng web_search             returned {{ searxng_search.json.results | length }} results
